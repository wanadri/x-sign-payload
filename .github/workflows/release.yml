name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          cd packages/js
          npm ci || npm install

      - name: Build
        run: |
          cd packages/js
          npm run build

      - name: Run tests
        run: |
          cd packages/js
          npm test

      - name: Publish to npm
        run: |
          cd packages/js
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Validate and update version
        run: |
          cd packages/php
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Releasing version $VERSION"
          # Update composer.json version if needed
          # Packagist auto-updates from GitHub tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/php/**/*.php
            packages/php/composer.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-docs:
    runs-on: ubuntu-latest
    needs: [ release-js, release-php ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build docs
        run: |
          cd docs
          npm ci || npm install
          npm run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
