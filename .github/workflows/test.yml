name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ "8.1", "8.2", "8.3", "8.4" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl
          coverage: xdebug

      - name: Validate composer.json
        run: |
          cd packages/php
          composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: packages/php/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('packages/php/composer.json') }}

      - name: Install dependencies
        run: |
          cd packages/php
          composer install --prefer-dist --no-progress

      - name: Run test suite
        run: |
          cd packages/php
          composer test

      - name: Run static analysis
        run: |
          cd packages/php
          composer analyse || true

      - name: Run linter
        run: |
          cd packages/php
          composer lint || true

  test-js:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18.x, 20.x, 21.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          cd packages/js
          npm ci || npm install

      - name: Type check
        run: |
          cd packages/js
          npm run typecheck || true

      - name: Run linter
        run: |
          cd packages/js
          npm run lint || true

      - name: Run tests
        run: |
          cd packages/js
          npm test

      - name: Build
        run: |
          cd packages/js
          npm run build

  cross-language-test:
    runs-on: ubuntu-latest
    needs: [ test-php, test-js ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install PHP dependencies
        run: |
          cd packages/php
          composer install

      - name: Install JS dependencies
        run: |
          cd packages/js
          npm ci || npm install

      - name: Run cross-language tests
        run: |
          cd tests/cross-language
          npm test || echo "Cross-language tests not yet implemented"
